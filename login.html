<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Login • Eights & Stakes
  </title>

  <!-- CSS -->

  <link
    rel="stylesheet"
    href="CSS/style.css"
  >

  <link
    rel="stylesheet"
    href="CSS/auth.css"
  >

</head>
<body>

  <!-- =========================
       BACKGROUND LIGHTS
  ========================== -->

  <div class="bg-light bg-light-1"></div>
  <div class="bg-light bg-light-2"></div>

  <!-- =========================
       SCREEN
  ========================== -->

  <main class="auth-screen">

    <section
      class="auth-card glass-panel"
    >

      <!-- HEADER -->

      <div class="auth-header">

        <div class="auth-label">
          PRISM GAMES
        </div>

        <h1>
          WELCOME BACK
        </h1>

        <p>
          Login or create your account
          to play multiplayer matches.
        </p>

      </div>

      <!-- TABS -->

      <div class="auth-tabs">

        <button
          class="auth-tab active"
          id="login-tab"
          type="button"
        >
          LOGIN
        </button>

        <button
          class="auth-tab"
          id="signup-tab"
          type="button"
        >
          SIGN UP
        </button>

      </div>

      <!-- LOGIN FORM -->

      <form
        id="login-form"
        class="auth-form"
      >

        <input
          type="email"
          class="input"
          id="login-email"
          placeholder="Email"
          required
        >

        <input
          type="password"
          class="input"
          id="login-password"
          placeholder="Password"
          required
        >

        <button
          type="submit"
          class="primary-btn"
        >
          LOGIN
        </button>

      </form>

      <!-- SIGNUP FORM -->

      <form
        id="signup-form"
        class="auth-form hidden"
      >

        <input
          type="text"
          class="input"
          id="signup-username"
          placeholder="Username"
          required
        >

        <input
          type="email"
          class="input"
          id="signup-email"
          placeholder="Email"
          required
        >

        <input
          type="password"
          class="input"
          id="signup-password"
          placeholder="Password"
          required
        >

        <button
          type="submit"
          class="primary-btn"
        >
          CREATE ACCOUNT
        </button>

      </form>

      <!-- MESSAGE -->

      <div
        class="auth-message"
        id="auth-message"
      ></div>

      <!-- FOOTER -->

      <div class="auth-footer">

        <button
          class="secondary-btn"
          id="back-btn"
          type="button"
        >
          BACK TO MENU
        </button>

      </div>

    </section>

  </main>

  <!-- =========================
       SUPABASE
  ========================== -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="JS/supabase.js"></script>

  <!-- =========================
       AUTH
  ========================== -->

  <script src="JS/auth.js"></script>

</body>
</html>
